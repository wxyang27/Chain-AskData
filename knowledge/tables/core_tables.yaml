      "theme": "毛利统计",
      "grain": "经营主题-日期",
      "required_partition": "dp",
      "key_fields": ["tenant_id", "stat_date"],
      "caliber_rules": [
        "P1 毛利专题扩展，MVP NL2SQL 暂不默认使用"
      ]
    },
    {
      "name": "dm_opt_qy_user_summary_info_all_d",
      "full_name": "soyoung_dw.dm_opt_qy_user_summary_info_all_d",
      "layer": "DM",
      "theme": "用户主题汇总",
      "grain": "用户",
      "required_partition": "dp",
