      "layer": "DIM",
      "theme": "门店维度",
      "grain": "门店",
      "required_partition": "dp",
      "key_fields": ["tenant_id", "hospital_id", "sy_hospital_id"],
      "caliber_rules": [
        "门店主键使用 tenant_id",
        "门店展示名称优先使用 sy_hospital_name",
        "大区使用 area_name，城市使用 city_name"
      ]
    },
    {
      "name": "dim_product_info",
      "full_name": "soyoung_dw.dim_product_info",
      "layer": "DIM",
      "theme": "品项维度",
      "grain": "品项",
      "required_partition": "dp",
      "key_fields": ["item_product_id", "product_id", "standard_name", "revenue_category"],
      "caliber_rules": [
        "品项口径使用 item_product_id 或 standard_name",
        "经营分类使用 revenue_category：大单品、常规品、大师团"
      ]
    },
    {
      "name": "dws_opt_qy_core_summary_all_d",
      "full_name": "soyoung_dw.dws_opt_qy_core_summary_all_d",
