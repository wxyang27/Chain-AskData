      "theme": "经营核心汇总",
      "grain": "经营主题汇总",
      "required_partition": "dp",
      "key_fields": ["tenant_id", "stat_date"],
      "caliber_rules": [
        "P1 汇总核对表，MVP 默认不优先生成明细 SQL"
      ]
    },
    {
      "name": "dws_opt_qy_tenant_topic_d",
      "full_name": "soyoung_dw.dws_opt_qy_tenant_topic_d",
      "layer": "DWS",
      "theme": "门店经营主题",
      "grain": "门店-日期",
