{
  "database": "soyoung_dw",
  "tables": [
    {
      "name": "dm_opt_qy_user_execution_record_all_d",
      "full_name": "soyoung_dw.dm_opt_qy_user_execution_record_all_d",
      "layer": "DM",
      "theme": "核销事实",
      "grain": "用户-订单-核销明细",
      "required_partition": "dp",
      "date_fields": ["executed_date", "verify_date_id"],
      "key_fields": ["customer_id", "uid", "tenant_id", "verify_date_id", "main_order_id"],
      "caliber_rules": [
        "核销发生类问题使用 executed_date",
        "有效核销必须过滤 is_valid = 1",
        "核销人数按 customer_id 去重",
        "核销人次按 verify_date_id 去重",
        "0 元单使用 exe_income = 0"
      ]
    },
    {
      "name": "dm_opt_qy_order_info_all_d",
      "full_name": "soyoung_dw.dm_opt_qy_order_info_all_d",
      "layer": "DM",
      "theme": "支付订单",
      "grain": "订单支付与待核销明细",
      "required_partition": "dp",
      "date_fields": ["pay_date", "stat_date"],
      "key_fields": ["uid", "tenant_id", "main_order_id", "item_product_id"],
      "caliber_rules": [
        "支付发生类问题使用 pay_date",
        "支付 GMV 默认过滤 is_paydate_cash = 0",
        "待核销金额是库存快照口径，使用 left_num > 0 与 left_gmv"
      ]
    },
    {
      "name": "dim_qy_tenant_info_all_d",
