critical_rules:
  CR001_dp: 查询分区必须使用最新 dp，除非表资产另有说明。
  CR002_execution_valid: 核销类指标必须过滤 is_valid = 1。
  CR003_execution_income_field: 核销收入必须使用 exe_income。
  CR004_visit_count_key: 核销人次必须使用 verify_date_id 去重。
  CR005_execution_user_key: 核销人数必须使用 customer_id 去重。
  CR006_payment_refund_filter: 支付类指标默认过滤 is_paydate_cash = 0。
  CR007_new_customer_field: 核销新客使用 is_new；支付新客使用 is_pay_new。
  CR008_unverified_snapshot: 待核销是库存快照口径，使用 left_num > 0。
  CR009_zero_income_filter: 0元单使用 exe_income = 0。
  CR010_standard_name: 标准品项优先使用 standard_name。
  CR011_upgrade_filter: 升单指标必须使用 is_up = 1。
  CR012_target_dependency: 进度达成率必须有目标来源和时间进度规则。
  CR016_time_progress_as_of_yesterday: 时间进度达成率默认使用本月1日至昨天的自然日天数除以本月总天数。
