  business_domain: execution
  support_status: sql_supported
  definition: 统计周期内连锁业务已核销服务产生的实收收入。
  formula_sql: SUM(exe_income)
  source_tables:
  - soyoung_dw.dm_opt_qy_user_execution_record_all_d
  date_field: executed_date
  required_fields:
  - exe_income
  - executed_date
  - dp
  - is_valid
  required_filters:
  - is_valid = 1
  supported_dimensions:
  - city_name
  - sy_hospital_name
  - standard_name
  - cx_first_channel
  - is_new
  - revenue_category
  - is_up
  forbidden_fields:
  - pay_gmv
  - pay_date
  - left_gmv
  critical_rules:
