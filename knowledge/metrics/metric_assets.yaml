  definition: 本月截至昨天指定品项实际核销收入，相对于按时间进度折算后的本月目标收入的完成率。
  formula_sql: (actual_exe_income / NULLIF(target_exe_income, 0)) / NULLIF(1.0 * elapsed_days
    / month_days, 0)
  source_tables:
  - soyoung_dw.dm_opt_qy_user_execution_record_all_d
  - soyoung_dw.dim_channel_month_income_target
  date_field: executed_date
  target_date_field: month
  parameters:
  - name: item_name
    type: string
    required: true
    description: 用户问题中的品项关键词，例如奇迹胶原、奇迹童颜、新一代热玛吉、BBL HERO。
  required_fields:
  - exe_income
  - executed_date
  - standard_name
  - dp
  - is_valid
  - target_absolute_value
  - month
  - first_level_hierarchy
  - second_level_hierarchy
  - third_level_hierarchy
  - fourth_level_hierarchy
  - target_type
  required_filters:
  - execution.dp = DATE_SUB(CURRENT_DATE(), 1)
  - execution.is_valid = 1
  - execution.standard_name REGEXP '<item_name>'
  - execution.executed_date >= DATE_FORMAT(CAST(CURRENT_DATE() AS TIMESTAMP), 'yyyy-MM-01')
  - execution.executed_date <= DATE_SUB(CURRENT_DATE(), 1)
  - target.month = DATE_FORMAT(CAST(CURRENT_DATE() AS TIMESTAMP), 'yyyy-MM')
  - target.first_level_hierarchy = '货'
  - target.second_level_hierarchy = '大单品'
  - target.third_level_hierarchy REGEXP '<item_name>'
  - target.fourth_level_hierarchy = '整体'
  - target.target_type = '收入'
  supported_dimensions:
  - standard_name
  forbidden_fields:
  - pay_gmv
  - pay_date
  - exe_amount
  - product_name
  numerator: 本月截至昨天指定品项实际核销收入，SUM(exe_income)
  denominator: 本月目标收入 * 时间进度
  time_progress_formula: elapsed_days / month_days，其中 elapsed_days 为本月1日至昨天的自然日天数，month_days
    为本月总自然日天数。
  critical_rules:
  - CR001_dp
  - CR002_execution_valid
  - CR003_execution_income_field
  - CR010_standard_name
  - CR012_target_dependency
  - CR016_time_progress_as_of_yesterday
  known_risks:
  - 品项名必须能映射到执行表 standard_name 和目标表 third_level_hierarchy。
  - 目标表仅按一级=货、二级=大单品、四级=整体、target_type=收入取目标。
  - target_absolute_value 在DDL中是 STRING，运行异常时需要显式 CAST。
