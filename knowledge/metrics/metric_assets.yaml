  - CR002_execution_valid
  - CR003_execution_income_field
  known_risks:
  - 不要把核销收入写成支付GMV。
  - 问新客核销时使用 is_new，不使用 is_pay_new。
  capability_notes: P0 主链路指标，可用于城市、门店、品项、渠道、新老客、升单等切片。
