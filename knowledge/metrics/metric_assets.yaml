schema_version: '1.0'
asset_name: chain_metric_assets
last_updated: '2026-07-20'
owner: Chain-AskData
purpose: Govern metric definitions, SQL capability, field mapping, risk boundaries,
  and eval linkage for chain AskData.
support_status:
  sql_supported: Source tables, fields, date field, filters, dimensions, and critical
    rules are clear enough for SQL generation.
  explain_only: Business caliber can be explained, but SQL should not be generated
    until dependencies are complete.
  exploratory: High-value metric under validation; allowed in exploratory eval, not
    in P0 hard gate.
  unsupported: Current project should refuse or redirect this request.
default_rules:
  partition_filter: Use latest partition dp = DATE_SUB(CURRENT_DATE(), 1) unless the
    source table explicitly defines another partition rule.
  execution_valid_filter: Execution metrics must include is_valid = 1.
  payment_refund_filter: Payment metrics default to is_paydate_cash = 0.
  fixed_period_rule: When the user asks a fixed month such as 2026-07, filter the
    metric date field to that month.
  ratio_rule: Ratio metrics must expose numerator, denominator, and denominator zero
    handling.
metrics:
- canonical: execution_income
  display_name: 核销收入
  aliases:
  - 核销实收
  - 消耗收入
  - 核销新客收入
  - 新客核销收入
  priority: P0
