# =============================================================================
# 统计
# =============================================================================
# 覆盖表: 5 张 (dm_opt_qy_user_summary / dws_opt_qy_core_summary /
#          dws_opt_qy_gross_margin_stats / dws_opt_qy_tenant_topic /
#          dim_user_qy_crm_customer_info)
# 总字段数: ~70 个关键字段
# 按字段类型分布:
#   join_key:     7   (user_id, crm_customer_id, tenant_id, customer_id, uid, union_id, product_id)
#   date:         5   (first_order_date, last_order_date, st_day, stat_date, create_date)
#   partition:    5   (dp × 5表)
#   store:        4   (tenant_name, organization_name, tenant_alias_name, sy_hospital_name)
#   area/city:    4   (area_name, city_name)
#   user_profile: 6   (membership_level, gender, tag_name_list, profile_tags, masked_mobile)
#   item:         3   (standard_name, revenue_category, product_standard_name)
#   channel:      4   (cx_first_channel, channel_name, channel_name_l1)
#   amount:       10  (exe_income, exe_amount, gross_margin_amt, ware_cost, manual_fee, income 等)
#   count/measure:7   (exe_cnt, exe_num, exe_user_cnt, total_order_cnt, total_order_use_cnt 等)
#   filter:       11  (is_new, is_qy, is_open, is_ceshi, customer_is_new, activate_180d_tag 等)
