# 字段级资产 — 基于 ODPS DDL 梳理（5张优先表）
# 来源：soyoung_dw MaxCompute 项目 DDL
# 生成时间：2026-07-08 15:24
# 审核状态：待审核 → 确认后合入 knowledge/schema/
# 提取方法：pyodps.table_schema → 按字段类型分类 → 筛选关键字段
#
# 字段类型分类：
#   count_key       — 人数/人次/订单数等去重计数键
#   amount          — 金额/收入/GMV/成本/毛利
#   join_key        — 主键/关联键（可跨表 JOIN）
#   dimension       — 门店/城市/大区/品项/渠道等维度
#   dimension_key   — 维度表的主键
#   date            — 日期字段
#   partition       — dp 分区
#   filter          — 状态过滤字段
#   measure         — 服务点/库存等非金额度量
#   profile         — 用户画像字段（标签/属性）

fields:

