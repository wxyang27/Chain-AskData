# =============================================================================
# 表1: dm_opt_qy_user_summary_info_all_d  [补充字段]
# 已在 core_tables.yaml 登记，但 core_fields.yaml 缺字段，本次从文档补充
# =============================================================================
- table_name: dm_opt_qy_user_summary_info_all_d
  full_table_name: soyoung_dw.dm_opt_qy_user_summary_info_all_d
  field_name: user_id
  field_type: join_key
  business_name: 用户ID
  description: 用户唯一标识，用于跨表关联核销、支付与 APP 活跃数据
  used_by_metrics: []
  caliber: "dm_opt_qy_user_summary_info_all_d 的 user_id 与核销表的 uid 关联（LEFT JOIN 关联活跃规模/新老客分析）；注意与 customer_id 体系不同"
  sample_values: []
  enum_values: []
  is_join_key: true
  is_metric_field: false
  is_dimension_field: false
  filters:
    - dp = CURRENT_DATE() - 1
  risk_notes:
    - "user_id 与 customer_id 跨体系关联会丢失部分覆盖"
    - "支付表关联用 uid，核销表关联用 customer_id 或 uid，确认后再 JOIN"

- table_name: dm_opt_qy_user_summary_info_all_d
  full_table_name: soyoung_dw.dm_opt_qy_user_summary_info_all_d
  field_name: first_use_date
  field_type: date
  business_name: 首次核销日期
  description: 用户首次核销的日期，用于判断核销新客/老客、计算核销渗透率
  used_by_metrics: []
  caliber: "核销新客判定：first_use_date = 当前统计日；核销老客：first_use_date < 当前统计日"
  sample_values: []
  enum_values: []
  is_join_key: false
  is_metric_field: false
  is_dimension_field: true
  filters:
    - dp = CURRENT_DATE() - 1
  risk_notes:
    - "first_use_date 是快照维度，需关注 dp 分区是否为最新"
    - "支付域新客使用 is_pay_new，核销域新客使用 is_new（事实表）或 first_use_date（汇总表），不要混用"


# =============================================================================
# 表2: dwd_md_app_log_nocheat  [新增表]
# APP 埋点日志（去作弊），核心活跃数据源，未在 core_tables.yaml 登记
# =============================================================================
- table_name: dwd_md_app_log_nocheat
  full_table_name: soyoung_dw.dwd_md_app_log_nocheat
  field_name: device_id
  field_type: count_key
  business_name: 设备ID
  description: APP 设备唯一标识，DAU/MAU/页面UV 的去重键
  used_by_metrics: []
  caliber: "用户活跃统计使用 COUNT(DISTINCT device_id) 作为去重依据"
  sample_values: []
  enum_values: []
  is_join_key: false
  is_metric_field: true
  is_dimension_field: false
  filters:
    - "app_id IN (131, 132)"
    - "type = 2"
  risk_notes:
    - "device_id 不等于用户ID（uid），不能替代 customer_id 做核销人数统计"
    - "同一个用户可能有多台设备，device_id 去重会放大用户数"

- table_name: dwd_md_app_log_nocheat
  full_table_name: soyoung_dw.dwd_md_app_log_nocheat
  field_name: type
  field_type: filter
  business_name: 日志类型
  description: "日志类型标记，type=2 表示有效活跃行为"
  used_by_metrics: []
  caliber: "统计活跃用户（DAU/MAU/页面UV）时过滤 type = 2"
  sample_values: ["2"]
  enum_values: ["2"]
  is_join_key: false
  is_metric_field: false
  is_dimension_field: false
  filters:
    - "type = 2"
  risk_notes:
    - "不加 type=2 会把非活跃行为（如后台心跳）计入活跃用户，严重虚高"

- table_name: dwd_md_app_log_nocheat
  full_table_name: soyoung_dw.dwd_md_app_log_nocheat
  field_name: app_id
  field_type: filter
  business_name: 应用ID
  description: "APP 标识，131/132 为连锁业务核心应用"
  used_by_metrics: []
  caliber: "APP 范围过滤使用 app_id IN (131, 132)"
  sample_values: ["131", "132"]
  enum_values: ["131", "132"]
  is_join_key: false
  is_metric_field: false
  is_dimension_field: false
  filters:
    - "app_id IN (131, 132)"
  risk_notes:
    - "不加 app_id 会把非连锁业务 APP 流量计入，需确认业务所需 app_id 范围"

- table_name: dwd_md_app_log_nocheat
  full_table_name: soyoung_dw.dwd_md_app_log_nocheat
  field_name: curr_page_id
  field_type: dimension
  business_name: 页面ID
  description: 用户当前浏览页面的标识
  used_by_metrics: []
  caliber: "页面活跃 UV 按 curr_page_id 区分，典型值见 dim_buried_point_info_all_d"
  sample_values: ["27941", "27957", "27972", "27986", "28885"]
  enum_values:
    - "27941-首页"
    - "27957-项目页面"
    - "27972-商详页面"
    - "27986-提单页面"
    - "28885-社区Feed页面"
    - "29086-群聊页面"
    - "26959-我的页面"
    - "28593-日记详情页面"
    - "28843-话题详情页面"
    - "26877-搜索结果页面"
    - "28637-肤测结果页面"
    - "28573-评价列表页面"
  is_join_key: false
  is_metric_field: false
  is_dimension_field: true
  filters: []
  risk_notes:
    - "page_id 数值含义需要联查 dim_buried_point_info_all_d 获取中文名称"
    - "新增页面后需同步更新埋点维度表"

- table_name: dwd_md_app_log_nocheat
  full_table_name: soyoung_dw.dwd_md_app_log_nocheat
  field_name: uid
  field_type: join_key
  business_name: 用户ID
  description: "APP 埋点中的用户标识，用于关联支付/核销表做跨域分析（如核销用户 APP 活跃渗透）"
  used_by_metrics: []
  caliber: "通过 uid 关联支付表、核销表进行用户口径分析；跨体系关联需关注 uid 映射覆盖率"
  sample_values: []
  enum_values: []
  is_join_key: true
  is_metric_field: false
  is_dimension_field: false
  filters: []
  risk_notes:
    - "uid 在支付域和 APP 日志域通常一致，但与核销域 customer_id 不完全映射"
    - "核销用户活跃渗透需要 uid 与 user_id/customer_id 的映射表"


