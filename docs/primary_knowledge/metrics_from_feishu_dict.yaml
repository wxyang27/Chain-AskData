  - id: A018
    name: 库存数
    english: inventory_cnt
    domain: 库存
    definition: 截止至今，总库存数量
    formula: SUM(warehouse_stock_num_td)
    data_type: INT
    unit: 件
    source_table: soyoung_dw.dws_qy_sc_ware_stock_stats_all_d
    derived_count: 0
    sql: |
      SELECT ware_name,
             ROUND(SUM(warehouse_stock_num_td), 0) AS 库存数
      FROM soyoung_dw.dws_qy_sc_ware_stock_stats_all_d
      WHERE pt = DATE_SUB(CURRENT_DATE(), 1)
      GROUP BY ware_name

  - id: A019
    name: 相控微针升单率
    english: micro_needle_upsell_rate
    domain: 核销
    definition: 统计周期内，原单为相控微针且当日发生升单的核销人次/相控微针原单核销人次
    formula: 升单人次 / 原单核销人次
    data_type: DECIMAL
    unit: "%"
    source_table: soyoung_dw.dm_opt_qy_user_execution_record_all_d
    derived_count: 0
    sql: |
      SELECT a.standard_name,
             COUNT(DISTINCT IF(b.verify_date_id IS NOT NULL,a.verify_date_id,NULL))
             / COUNT(DISTINCT a.verify_date_id) 升单率
      FROM (
          SELECT standard_name, verify_date_id
          FROM soyoung_dw.dm_opt_qy_user_execution_record_all_d
          WHERE dp = DATE_SUB(current_date(),1)
          AND is_valid = 1
          AND standard_name REGEXP '相控微针'
          AND ord_up_type_name = '原单'
      ) a
      LEFT JOIN (
          SELECT standard_name, verify_date_id
          FROM soyoung_dw.dm_opt_qy_user_execution_record_all_d
          WHERE dp = DATE_SUB(current_date(),1)
          AND ord_up_type_name = '升单'
          AND is_valid = 1
      ) b ON a.verify_date_id = b.verify_date_id
      GROUP BY a.standard_name

# =============================================================================
# Part 2: 衍生指标汇总 (132个)
# =============================================================================
derived_metrics_summary:
  description: >
    衍生指标 = 原子指标 × 维度切片。对于核销域的每个原子指标（gmv/收入/服务点/人数/人次/订单数/客单价），
    按以下维度展开形成衍生指标矩阵：
      1. 新客/老客 — is_new = 1 / is_new = 0
      2. 大师团 — revenue_category = '大师团'
      3. 大单品/常规品 — revenue_category = '大单品' / '常规品'
      4. 获客渠道 — cx_first_channel = '私域' / '公域' / '老带新'
      5. 品项 — standard_name REGEXP 'BBL HERO' / '奇迹童颜' / '新一代热玛吉' 等

    支付域同理，对应维度为 is_pay_new / revenue_category / standard_name。
    升单域在此基础上叠加 is_up = 1 过滤。

  dimension_slicing:
    - dimension: 新客/老客
      filter_nuclear: is_new = 1 (新客) / is_new = 0 (老客)
      filter_pay: is_pay_new = 1 (新客) / is_pay_new = 0 (老客)
      coverage: 覆盖核销gmv/收入/服务点/人数/人次/订单数/客单价/升单各指标

    - dimension: 大师团/大单品/常规品
      filter: revenue_category = '大师团' / '大单品' / '常规品'
      coverage: 覆盖核销gmv/收入/服务点/人数/人次/订单数/客单价/升单各指标

    - dimension: 获客渠道
      filter: cx_first_channel = '私域' / '公域' / '老带新'
      coverage: 覆盖核销gmv/收入/服务点/人数/人次/订单数/客单价/升单各指标

    - dimension: 品项
      filter: standard_name REGEXP 'BBL HERO' / '奇迹童颜' / '新一代热玛吉' / '爱拉丝提' / '相控微针'
      coverage: 覆盖核销gmv/收入/服务点/人数/人次/订单数/客单价/升单/支付gmv/支付人数等

  special_composite_metrics:
    - id: D130
      name: 相控微针升单率
      type: 复合指标
      formula: 原单为相控微针且当日升单核销人次 / 相控微针原单核销人次

    - id: D131
      name: BBL HERO加购率
      type: 复合指标
      formula: BBL HERO升单核销人次 / BBL HERO总核销人次

    - id: D132
      name: BBL HERO渗透率
      type: 复合指标
      formula: 90日内核销过BBL HERO的用户数 / 总核销用户数
      note: 使用 product_name 字段（非 standard_name）

  dashboard_mapping:
    - dashboard: 用户KPI看板
      metrics: [D010新客核销收入, D011老客核销收入, D039老客核销人次]
    - dashboard: 用户整体看板
      metrics: [D010, D038]
    - dashboard: 连锁品项总览
      metrics: [D012, D014]
    - dashboard: 连锁品项分析
      metrics: [D013, D041, D054, D070, D089, D093, D101]
    - dashboard: 信息流网咨看板
      metrics: [D028]

  full_list_range:
    atomic: "A001-A019 (共19个，含SQL)"
    derived: "D001-D132 (共132个，含维度切片+SQL+数据源表+看板映射)"
    total: "151 个指标条目，全部可在飞书来源表中检索"

  source_table_coverage:
    - soyoung_dw.dm_opt_qy_user_execution_record_all_d  # 核销主表
    - soyoung_dw.dm_opt_qy_order_info_all_d              # 支付主表
    - soyoung_dw.dws_qy_sc_ware_stock_stats_all_d        # 库存表
