    source_table: soyoung_dw.dm_opt_qy_order_info_all_d
    derived_count: 6
    sql: |
      select count(distinct main_order_id) as 支付订单数
      from soyoung_dw.dm_opt_qy_order_info_all_d
      WHERE dp = DATE_SUB(CURRENT_DATE(),1)
