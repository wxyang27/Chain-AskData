# 指标字典 — 从飞书指标总表提取
# 来源：https://soyoung.feishu.cn/sheets/AxgVsItPmhqjwatTKjLctxeAnsp
#   - 原子指标字典 (sheet: 2GzqSC)
#   - 衍生指标字典 (sheet: 3ZQiZu)
# 生成时间：2026-07-08
# 审核状态：待审核 (放在 docs/primary_knowledge/ 供人工复核后合入 knowledge/)
#
# 统计摘要：
#   - 原子指标: 19 个 (A001-A019)
#   - 衍生指标: 132 个 (D001-D132)
#   - 业务域覆盖: 核销 / 支付 / 库存
#   - 维度切片: 新客/老客 / 大师团 / 大单品/常规品 / 获客渠道 / 品项
#   - 指标类型: 衍生指标(基础) / 复合指标(多指标计算) / 比率类
#   - 所有指标均附带 SQL 代码和数据源表

# =============================================================================
# Part 1: 原子指标 (19个)
# =============================================================================
atomic_metrics:
  - id: A001
    name: 核销gmv
    english: verify_gmv
    domain: 核销
    definition: 统计周期内，连锁业务总核销gmv
    formula: SUM(exe_amount)
    data_type: DECIMAL
    unit: 元
    source_table: soyoung_dw.dm_opt_qy_user_execution_record_all_d
    derived_count: 9
    sql: |
      SELECT  SUM(exe_amount) 核销gmv
      FROM    soyoung_dw.dm_opt_qy_user_execution_record_all_d
      WHERE   dp = DATE_SUB(CURRENT_DATE(),1)
      AND     is_valid = 1

  - id: A002
    name: 核销收入
    english: verify_income
    domain: 核销
    definition: 统计周期内，连锁业务总核销收入
    formula: SUM(exe_income)
    data_type: DECIMAL
    unit: 元
    source_table: soyoung_dw.dm_opt_qy_user_execution_record_all_d
    derived_count: 9
    sql: |
      SELECT  SUM(exe_income) 核销收入
      FROM    soyoung_dw.dm_opt_qy_user_execution_record_all_d
      WHERE   dp = DATE_SUB(CURRENT_DATE(),1)
      AND     is_valid = 1

  - id: A003
    name: 核销客单价
    english: verify_avg_price
    domain: 核销
    definition: 统计周期内，总核销收入/总核销人次
    formula: SUM(exe_income) / COUNT(DISTINCT verify_date_id)
    data_type: DECIMAL
    unit: 元/人次
    source_table: soyoung_dw.dm_opt_qy_user_execution_record_all_d
    derived_count: 10
    note: ⚠ 原SQL使用verify_date_id统计人次，请确认是否等同于核销人次
    sql: |
      SELECT SUM(exe_income)/COUNT(DISTINCT verify_date_id) 核销客单价
      FROM  soyoung_dw.dm_opt_qy_user_execution_record_all_d
      WHERE dp = DATE_SUB(CURRENT_DATE(),1)
