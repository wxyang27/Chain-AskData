    english: upsell_visit_cnt
    domain: 核销
    definition: 统计周期内，升单的总人次
    formula: COUNT(DISTINCT verify_date_id)
    data_type: INT
    unit: 人次
    source_table: soyoung_dw.dm_opt_qy_user_execution_record_all_d
    derived_count: 9
    sql: |
      SELECT  COUNT(DISTINCT verify_date_id) AS 升单人次
      FROM    soyoung_dw.dm_opt_qy_user_execution_record_all_d
